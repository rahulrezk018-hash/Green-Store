//------SHOW--ITEMS-----//
 function ShowData(data){
   let showProducts=document.getElementById("show-items");
   showProducts.innerHTML="";
   data.forEach((item,index) =>{
     showProducts.innerHTML+=`
     <div class="box">
     <img src="${item.img}">
     <h2>${item.name}</h2>
     <h3>${item.price} ₹</h3>
     <p>${item.discription}</p>
     <p><i class="fa-solid fa-star"> ${item.rating}</i></p>
     <hr>
     <div class="add-details" >
     <div class="addto">
     <button onclick='Addto(${JSON.stringify(item)})'>Add to Cart</button>
     </div>
     <div class="details">
     <button onclick='Detailspage(${JSON.stringify(item)})'>View Details</button>
     </div>
     </div>
     </div>
     `;
   });
   if(data.length === 0){
     showProducts.innerHTML="<h3 style='color:white'>No Products</h3>"
   }
 }
 //Filter+Sort//
 function ApplyProducts(){
   //search-input//
   let search=document.getElementById("search").value.toLowerCase();
   //min-input
   let min=Number(document.getElementById("min").value)||0;
   //max-input
   let max=Number(document.getElementById("max").value)||Infinity;
   //sort-input
   let sort=document.getElementById("sort").value;
   //filtered-product
   let filtered=product.filter(item => item.name.toLowerCase().includes(search) && item.price >= min && item.price <= max);
   //sort-product
   let data=filtered;
   if(sort === "low"){
     data=[...filtered].sort((a,b)=>
     a.price - b.price);
   }
   else if(sort === "high"){
     data=[...filtered].sort((a,b)=>
     b.price - a.price);
   }
   ShowData(data);
 }
 function Addto(products){
   let user=localStorage.getItem("login");
   if(user !== "true"){
          alert("⚠️ Access Restricted please login to continue You need to sign in before accessing this feature like add to cart, View Details, or menu options.Login first to enjoy the full Green Store experience");
     window.location.href="login.html";
     return;
   }
   let cart=JSON.parse(localStorage.getItem("cart"))||[];
   let find=cart.find(item => item.name === products.name);
   if(find){
     find.qty=(find.qty || 1)+1;
   }
   else{
     cart.push({
       name:products.name,
       price:products.price,
       img:products.img,
       discription:products.discription,
       rating:products.rating,
       qty:products.qty
     });
   }
   localStorage.setItem("cart",JSON.stringify(cart));
badge();
showPopup();
 }

 function Detailspage(product){
      let user=localStorage.getItem("login");
   if(user !== "true"){
  alert("⚠️ Access Restricted please login to continue You need to sign in before accessing this feature like add to cart, View Details, or menu options.Login first to enjoy the full Green Store experience");
     window.location.href="login.html";
     return;
   }
   localStorage.setItem("product",JSON.stringify({
     name: product.name,
     price: product.price,
     img:product.img,
       discription:product.discription,
       rating:product.rating,
       qty:product.qty,
       category: product.category
   }));
   window.location.href="details.html";
 }
 ShowData(product);
