    <style>
      body{
        background: linear-gradient(to right,rgba(6, 5, 91, 1),rgba(51, 12, 32, 1));

      }
      .nav{
        display:flex;

        color:white;
      }
      .menu{
        display:none;
        flex-direction:column;
        align-items:center;
        width:60%;
        height:30%;
        background:rgba(19, 18, 111, 1);
        position:absolute;
        top:90px;
        right:0;
        z-index:999;
      }
      .menu-item{
        display:flex;
        flex-direction:column;
      }
      .menu a{
        background: white;
        color:black;
        padding:6px 12px;
        margin:20px;
        width:100px;
        font-size: 24px;
        text-decoration:none;
        border-radius:7px;
        cursor:pointer;
      }
      .me button{
        background:none;
        color:white;
        border:none;
        font-size:35px;
        cursor:pointer;
      }
      .log-out{
        display:flex;
        flex-direction: column;
        width:30%;
        margin-top:4vh;
      }
      .log-out button{
        background:white;
        color:black;
        padding:12px 17px;
        border:none;

        font-size:23px;
        margin:20px;
        cursor:pointer;
      }
      .card-center{
        display:flex;
        justify-content: center;
        align-items:center;
        flex-wrap:wrap;
        gap:10px;
        
      }
      .card{
        background:rgba(184, 210, 183, 0.24);
        color:white;
        padding:23px;
        margin:20px;
        width:800px;
        border-radius:20px;
        font-size:23px;
        transition:all 0.4s ease ;
      }
      .card:hover{
        transform:translateY(-4px);
        background: linear-gradient(to right,rgba(255, 255, 255, 0.39),rgba(112, 113, 84, 0.22));
        border-radius:24px;
      }
      .card h1{
        text-align:center;
      }
      .card img{
        width:100%;
        height:auto;
        background:rgba(255, 255, 255, 0.66);
        border-radius:26px;
        
      }
      /*---qty-buttons*/
      .qty-center{
        display:flex;
        justify-content:center;
        align-items:center;
        gap:20px;
      }
      .qty1 button{
        background:green;
        color:white;
        width:40px;
        height:40px;
        font-size:30px;
        border:none;
        border-radius:10px;
        cursor:pointer;
      }
      .qty0 button{
        background:red;
        color: white ;
        width:40px;
        font-size:30px;
        border-radius:10px;
        height:40px;
        border: none;
        cursor:pointer;
      }
    /*Buy-Remove Button*/
      .bu-re{
    display:flex;
    justify-content: space-around;
    align-items:center;
    margin-top:2vh;
  }
  .buy button{
    background:rgba(208, 168, 24, 1);
    color:blue;
    padding:10px 70px;
    margin:10px;
    border:none;
    font-size:28px;
    border-radius:4px;
    cursor:pointer;
  }
  .remove button{
    background:rgba(173, 13, 13, 1);
    color:white;
    padding:10px 70px;
    margin:10px;
    font-size:28px;
    border:none;
    border-radius:4px;
    cursor:pointer;
  }
  /*---Total --subtotal*/
  .total{
    background:none;
    color:white;
    width:600px;
    padding:24px;
  }
.total h4{
  font-size:23px;
  color:rgba(218, 230, 198, 0.93);

}
.total h5{
    font-size:23px;

}

      }
      .log-out{

      }
      /*---qty-buttons*/

.total h4{

}

      </style>
      <body>
         <div class="nav">
           <div class="logo">
          <h3>GREEN STORE</h3>
           </div>
           <div class="menu" id="menu">
             <div class="menu-item">
             <a href="index.html"><i class="fa-solid fa-house"></i> Home</a>
             <a href="cart.html"><i class="fa-solid fa-cart-shopping"></i> Cart</a>
             <a href="order.html"><i class="fa-solid fa-bag-shopping"></i> Order </a>
             <a href="about.html"><i class="fa-solid fa-user"></i> About Devloper</a>
             </div>
             </div>
             <div class="me">
               <button id="btn"onclick="Openmenu()">☰</button>
             </div>
         </div>
           <hr>
           <div class="card-center" id="items-show">
           </div>
             <hr>
             <div class="total">
               <h4>SubTotal: <span id="total"></span>
               </h4>
               <h5>Discount: -<span id="discount"></span></h5>
               <h1>Total :<span id="final"></span></h1>
               </div>
      </body>
      <script>
        //toggle dark mode//
window.addEventListener("DOMContentLoaded",function(){
  let menu=document.getElementById("menu");
  menu.style.display="none";
});
function Openmenu() {
  let menu = document.getElementById("menu");
  let btn = document.getElementById("btn");
if(menu.style.display==="none"){
  menu.style.display="block";
  btn.innerHTML="×";
}
else{
  menu.style.display="none";
  btn.innerHTML= "☰";
}
}
 function Show(){
   let cart=JSON.parse(localStorage.getItem("cart"))||[];
   let showItems=document.getElementById("items-show");
   showItems.innerHTML="";
   cart.forEach((item,index)=>{
     showItems.innerHTML+=`
      <div class="card">
      <img src="${item.img}">
      <h1>${item.name}</h1>
      <h4><span>Price: </span>${item.price} ₹</h4>
      <p>${item.discription}</p>
      <hr>
              <div class="qty-center">
                 <div class="qty1">
                   <button onclick='plus(${index})'>+</button>
                 </div>
                 <span>${item.qty || 1}</span>
                 <div class="qty0"> 
                 <button onclick='minus(${index})'>-</button>
                 </div>
               </div>
               <div class="bu-re">
                 <div class="buy"><button onclick='Buy(${JSON.stringify(item)})'>Buy</button></div>
               <div class="remove"><button onclick='remove(${index})'>Remove</button></div>
             </div>
             </div>
    `;
   });
   total();
 }
 function remove(index){
   let cart=JSON.parse(localStorage.getItem("cart"))||[];
   cart.splice(index,1);
   
      localStorage.setItem("cart",JSON.stringify(cart));
      Show();
 }
 function plus(index){
   let cart=JSON.parse(localStorage.getItem("cart"))||[];
     cart[index].qty=(cart[index].qty || 1)+1;
     localStorage.setItem("cart",JSON.stringify(cart));
     Show();
 }
 function minus(index){
   let cart=JSON.parse(localStorage.getItem("cart"))||[];
   if(cart[index].qty > 1){
     cart[index].qty --;
   }
      localStorage.setItem("cart",JSON.stringify(cart));
      Show();
 }
 function total(){
   let cart=JSON.parse(localStorage.getItem("cart"))||[];
  let total=0
  cart.forEach(item =>{
    total+=item.price*(item.qty || 1);
  });
  let discount=(total*30)/100;
  let final=total-discount;
  document.getElementById("total").innerHTML=total;
  document.getElementById("discount").innerHTML=discount;
  document.getElementById("final").innerHTML=final;
 }
 function Buy(item){
      localStorage.setItem("item",JSON.stringify(item));
      window.location.href="buy.html";
 }
 Show();
 total();
      </script>
