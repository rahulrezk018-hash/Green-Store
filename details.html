  let productsCategory=JSON.parse(localStorage.getItem("product"))||[];
  function Relatedproducts(){
    let related=data.filter(item => item.category === productsCategory.category && item.name !== productsCategory.name);
    let showItems=document.getElementById("show-product");
    showItems.innerHTML="";
    related.forEach(item =>{
    showItems.innerHTML+=`
    <div class="box">
    <img src="${item.img}">
    <h2>${item.name}</h2>
    <p><span>Price : </span>${item.price} ₹</p>
    <p><span>Rating : </span>${item.rating}</p>
    <hr>
    <div class="top-buttons">
    <div class="buy">
    <button onclick='Viewdetails(${JSON.stringify(item)})'>View Details</button></div>
    </div>
    `;
  });
  }
  //Addtocart button
  function Addtocart(products){
    let cart=JSON.parse(localStorage.getItem("cart"))||[];
    let find=cart.find(item => item.name === product.name);
    if(find){
      find.qty=(find.qty || 1)+1;
    }
    else{
      cart.push({
    name: products.name,
  price: products.price,
  img: products.img,
  discription: products.discription,
  rating: products.rating,
  qty: products.qty,
  category: products.category
      });
    }
    localStorage.setItem("cart",JSON.stringify(cart));
    window.location.href="cart.html";
  }
  //Buy-buttons
  function Buypage(item){
    localStorage.setItem("item",JSON.stringify(item));
    window.location.href="buy.html";
  }
  //View Details 
  function Viewdetails(product){
    localStorage.setItem("product",JSON.stringify(product));
    window.location.href="details.html";
  }
  function Back(){
    document.getElementById("load").style.display="flex";
    setTimeout(function(){
      window.location.href="index.html";
    },3000);
  }
