<!DOCTYPE HTML>
<html>

<head>
  <meta charset="UTF-8">
  <title>Buy page</title>
  <style>
body{
      margin:0;
      font-family:arial,sans-serif;
      background: linear-gradient(to right,rgba(9, 7, 82, 1),rgba(66, 19, 10, 0.9));
    }
    .center{
      display:flex;
      justify-content: center;
      align-items:center;
      margin:20px;
      margin-top:10vh;
    }
    .card{
      color:white;
      background:rgba(255, 250, 250, 0.24);
      padding:33px;
      margin:10px;
    }
    .card img{
      width:800px;
      background:rgba(255, 250, 250, 0.85);
      height:auto;
      border-radius:30px;
    }
    .card p{
      width:400px;
    }
    .card h1{
      font-family:Arial;
      text-align:center;
    }
    .js{
      display: flex;
      justify-content:flex-start;
      align-items:center;
    }
    .js button {
      background:rgba(85, 35, 230, 1);
   color:white;
   padding:23px 80px;
   margin:20px;
   border:none;
   border-radius:20px;
   text-align:right;
   cursor:pointer;
   font-size:29px;
    }
     .popup{
      height:100%;
      width:100%;
      position:fixed;
      top:0;
      display:none;
      justify-content: center;
      align-items:center;
      background:rgba(0,0,0,0.5);
    }
    .popup-box{
      background:white;
      color:blue;
      padding:23px;
      top:10px;
      margin-left:2cm;
      width:500px;
      height:auto;
      text-align:center;
      border-radius:20px;
    }
    .popup button{
      background:blue;
      color:white;
      padding:9px 15px;
      margin:13px;
      border-radius:20px;
      border:none;
    }
    .popup h1{
      text-align:center;
    }
    .d{
      display:flex;
      flex-direction:column;
      align-items:center;
      color:rgba(255, 255, 255, 1);
      background:rgba(243, 237, 236, 0.32);
      height:42vh;
    }
    .d h2{
      color:white;
    }
    .input{
      background:white;
      color:black;
      padding:22px 23px;
      margin:10px;
      width:800px;
      border-radius:10px;
      font-size:27px;
    }
    @media (max-width:960px){
      .card img{
        width:100px;
      }
      .input{
        padding:8px 16px;
        width:300px;
        font-size:12px;
      }
      .card h1{
        font-size:18px;
        text-align:left;
      }
      .card h2{
        font-size:9px;
      }
          .popup-box{
      background:white;
      color:blue;
      padding:13px;
      width:300px;
      margin-right:2cm;
      height:auto;
      text-align:center;
      border-radius:2px;
    }
    .popup h1{
      width:200px;
      font-size:7px;
    }
    .popup button{
      background:blue;
      color:white;
      padding:2px 15px;
      margin:13px;
      border-radius:2px;
      border:none;
    }
      .card h3{
        font-size:7px;
      }
      .card p{
        width:300px;
      }
      .js button{
        padding:12px 20px;
        margin:0;
        font-size:17px;
        
      }
      .d{
        height:60vh;
      }
      .d h1{
        font-size:12px;
        color:rgba(66, 68, 90, 1);
      }
      .d h2{
        font-size:9px;
        color:white;
      }
      .d p{
        width:300px;
        font-size:4px;
      }
    }
  </style>
  </head>
  <body>
    <hr>
     <div class="d">
   <h1 style="color:white;">Enter Your Address</h1>
   <input id="address" class="input" type="text" placeholder="Enter Address">
   <p style="background:blue;">following the address box → Vill: , Po, Ps, And last type your state</p>
   <input class="input" id="number" type="number" placeholder="Enter Mobile Number">
   <input class="input" type="text" placeholder="Enter area">
   <input id="email" class="input" type="email" placeholder="Enter Email">
   <input class="input" id="pin" type="number" placeholder="Pin code">
   <h2><span style="background:white;" id="msg"></span></h2>
   <div class="js">
     <button onclick="Pay()">Payment</button>
   </div>
 </div>
 <hr>
 <hr>
 <div id="item-show"></div>
    <div class="popup" id="popup">
      <div class="popup-box">
    <h1>your order has been confromed</h1>
    <button onclick="closePopup()">OK</button>
      </div>
    </div>
  </body>
<script>
function showPopup(){
  let popup=document.getElementById("popup");
  popup.style.display="flex";
  setTimeout(function(){
    popup.style.display="none";
  },3000);
}
function closePopup(){
  document.getElementById("popup").style.display="none";
  window.location.href="order.html";
}
  let item=JSON.parse(localStorage.getItem("item"))||[];
  function ShowbuyProducts(){
    let showItems=document.getElementById("item-show");
    showItems.innerHTML=`
    <div class="center">
    <div class="card">
    <img src="${item.img}">
    <h1>${item.name}</h1>
    <h2><span>Price: </span>${item.price} ₹</h2>
    <h5><span>Qty: </span>${item.qty || 1}</h5>
    <p>${item.discription}</p>
    <hr>
    <h4><span>Rating: </span>${item.rating}</h4>
    `;
  }
  function Pay(){
    let email=document.getElementById("email").value;
    let number=document.getElementById("number").value;
    let address=document.getElementById("address").value;
    let pin=document.getElementById("pin").value;
    //message-box 
    let msg=document.getElementById("msg");
    //address-border
    let add=document.getElementById("address");
    //email-border
    let em=document.getElementById("email");
    //number-border
    let num=document.getElementById("number");
    //pin-border
    let p=document.getElementById("pin");
    //conditions 
    if(address === ""||email === ""||number === "" || pin === "" ){
      msg.innerHTML="please fill the box";
       msg.style.color="red";
      add.style.border="2px solid red";
      em.style.border="2px solid red";
      num.style.border="2px solid red";
      p.style.border="2px solid red";
    }
    //address-condition 
    else if(!address.includes("Vill:")){
      msg.innerHTML="please check your address";
      msg.style.color="red";
      add.style.border="2px solid red";
    }
    //email-conditions 
    else if(!email.includes("@gmail.com")){
      msg.innerHTML="please check your email";
      msg.style.color="red";
      em.style.border="2px solid red";
    }
    //number-conditions
    else if(number.length !== 10){
      msg.innerHTML="please check your mobile number";
      num.style.border="2px solid red";
      msg.style.color="red";
    }
    //pin-conditions
    else if(pin.length !== 6){
      msg.innerHTML="please check your number";
      p.style.border="2px solid red";
      msg.style.color="red";
    }
    else{
      msg.innerHTML="order successful";
      msg.style.color="green";
       add.style.border="2px solid green";
      em.style.border="2px solid green";
      num.style.border="2px solid green";
      p.style.border="2px solid green";
      showPopup();
    }
    localStorage.setItem("address",JSON.stringify({
      name:item.name,
      price:item.price,
      img:item.img,
      discription:item.discription,
      qty:item.qty,
      rating:item.rating,
      
      address:address,
      email:email,
      pin:pin,
      number:number
    }));
  }
  ShowbuyProducts();
</script>
</html>
